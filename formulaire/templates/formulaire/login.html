{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PADISAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --flag-green: #00A859;
            --flag-gold: #FFD700;
            --flag-red: #E50012;
            --light-beige: #FDF8E7;
            --dark-green: #00623B;
            --primary-green: #2c6e2f;
            --secondary-orange: #e67e22;
        }

        body.login-page {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            position: relative;
            background: url("{% static 'formulaire/images/login-bg.jpg' %}") center center / cover no-repeat fixed;
            overflow: hidden;
        }

        body.login-page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.35);
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 5px solid #5DBB63;
            backdrop-filter: blur(4px);
            animation: fadeInUp 0.6s ease-out;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .logo {
            max-width: 440px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        .project-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .project-title h3 {
            color: var(--primary-green);
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .project-title p {
            color: #666;
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.4;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .login-header h2 {
            color: var(--dark-green);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .login-header p {
            color: #888;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-green);
            margin-bottom: 8px;
            display: block;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e8e8e8;
            transition: all 0.3s;
            font-size: 1rem;
            background: #fafafa;
        }

        .form-control:focus {
            border-color: var(--secondary-orange);
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
            background: white;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--flag-green) 0%, var(--flag-gold) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44, 110, 47, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 12px 15px;
            border: none;
        }

        .alert-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border-left: 4px solid var(--primary-green);
        }

        .alert-error,
        .alert-danger {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-info {
            background: linear-gradient(135deg, #d1ecf1, #bee5eb);
            color: #0c5460;
            border-left: 4px solid var(--secondary-orange);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .footer small {
            color: #777;
            font-size: 0.75rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 30px 25px;
                max-width: 95%;
            }

            .project-title h3 {
                font-size: 1.2rem;
            }

            .login-header h2 {
                font-size: 1.5rem;
            }

            .logo {
                max-width: 220px;
            }
        }
    </style>
</head>

<body class="login-page">
    <div class="login-card">
        <div class="logo-container">
           
        </div>

        <div class="login-header">
            <h2>Bienvenue</h2>
            <p>Connectez-vous pour accéder à votre espace</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="username" class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="form-control"
                    placeholder="Entrez votre nom d'utilisateur" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control"
                    placeholder="Entrez votre mot de passe" required>
            </div>

            <button type="submit" class="btn-login">
                Se connecter
            </button>
        </form>

        <div class="footer">
            <small>
                &copy; {% now "Y" %} Binor &amp; Associés / I&amp;D - Tous droits réservés
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'translateX(5px)';
            });
            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'translateX(0)';
            });
        });
    </script>
</body>

</html>
